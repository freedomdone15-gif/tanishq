<!DOCTYPE html>
<html>
<head>
  <title>Code Drop</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }

    /* ─── LOGIN SCREEN ─────────────────────────────────────────── */
    #loginScreen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    #loginScreen.hidden {
      display: none;
    }

    .login-box {
      width: 100%;
      max-width: 400px;
      border: 2px solid #fff;
      padding: 40px 32px 36px;
      position: relative;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 11px;
      letter-spacing: 3px;
      text-align: center;
      opacity: 0.4;
      margin-bottom: 36px;
    }

    .login-label {
      font-size: 10px;
      letter-spacing: 3px;
      opacity: 0.6;
      margin-bottom: 6px;
      display: block;
    }

    .login-input {
      width: 100%;
      padding: 14px 16px;
      background: #000;
      border: 2px solid #fff;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }

    .login-input:focus {
      border-color: #fff;
      box-shadow: 0 0 0 1px #fff;
    }

    .login-input.shake {
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: #fff;
      color: #000;
      border: 2px solid #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 4px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      margin-top: 4px;
    }

    .login-btn:hover {
      background: #000;
      color: #fff;
    }

    .login-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .login-error {
      font-size: 11px;
      letter-spacing: 2px;
      color: #ff4444;
      text-align: center;
      margin-top: 16px;
      height: 14px;
      transition: opacity 0.2s;
    }

    /* corner decoration */
    .login-box::before,
    .login-box::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background: #000;
      border: 2px solid #fff;
    }
    .login-box::before { top: -6px; left: -6px; }
    .login-box::after  { bottom: -6px; right: -6px; }

    /* ─── MAIN APP ────────────────────────────────────────────── */
    #appScreen {
      display: none;
      width: 100%;
      max-width: 520px;
      flex-direction: column;
    }

    #appScreen.visible {
      display: flex;
    }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    .app-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 5px;
    }

    .logout-btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.4);
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 5px 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover {
      color: #fff;
      border-color: #fff;
    }

    .welcome-tag {
      font-size: 10px;
      letter-spacing: 2px;
      opacity: 0.35;
      margin-right: 10px;
    }

    /* existing styles */
    .container { width: 100%; }

    input#codeInput {
      width: 100%;
      padding: 18px;
      background: #000;
      border: 2px solid #fff;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      outline: none;
      margin-bottom: 30px;
    }

    input#codeInput:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    h4 {
      text-align: center;
      letter-spacing: 2px;
      margin: 25px 0 15px;
      font-size: 12px;
      opacity: 0.5;
      font-family: 'Share Tech Mono', monospace;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .btn {
      border: 2px solid #fff;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
    }

    .btn:hover { background: rgba(255,255,255,0.1); }
    .btn.active { background: #fff; color: #000; }

    .full { grid-column: span 3; }

    .status {
      text-align: right;
      margin-top: 20px;
      font-size: 11px;
      letter-spacing: 1px;
    }
    .status.connected    { color: #00ff00; }
    .status.disconnected { color: #ff4444; }
    .status.sending      { color: #ffff00; }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 13px 18px;
      border: 2px solid;
      background: #000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 1000;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      letter-spacing: 1px;
    }
    .notification.show    { opacity: 1; }
    .notification.success { border-color: #00ff00; color: #00ff00; }
    .notification.error   { border-color: #ff4444; color: #ff4444; }
    .notification.warning { border-color: #ffa500; color: #ffa500; }

    .connection-indicator {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4444;
      transition: background 0.3s;
    }
    .connection-indicator.connected {
      background: #00ff00;
      box-shadow: 0 0 10px #00ff00;
    }
    .connection-indicator.connecting {
      background: #ffa500;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN SCREEN ─────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">CODE DROP</div>
    <div class="login-subtitle">AUTHORIZED ACCESS ONLY</div>

    <label class="login-label">USERNAME</label>
    <input class="login-input" id="loginUser" type="text" placeholder="enter username" autocomplete="username" />

    <label class="login-label">PASSWORD</label>
    <input class="login-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password" />

    <button class="login-btn" id="loginBtn" onclick="attemptLogin()">LOGIN</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ── MAIN APP ──────────────────────────────────── -->
<div class="connection-indicator" id="connectionIndicator"></div>

<div id="appScreen">
  <div class="app-header">
    <div class="app-logo">CODE DROP</div>
    <div style="display:flex;align-items:center;">
      <span class="welcome-tag" id="welcomeTag"></span>
      <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
  </div>

  <div class="container">
    <input id="codeInput" placeholder="ENTER CODE" />

    <h4>SELECT VALUE</h4>
    <div class="grid" id="valueGrid">
      <div class="btn active">$1</div>
      <div class="btn">$2</div>
      <div class="btn">$3</div>
      <div class="btn">$4</div>
      <div class="btn">$5</div>
      <div class="btn">$6.25</div>
      <div class="btn">$12.50</div>
      <div class="btn">$25</div>
      <div class="btn">$50</div>
      <div class="btn full">NO VALUE</div>
    </div>

    <h4>SELECT CODE TYPE</h4>
    <div class="grid" id="typeGrid">
      <div class="btn full active">HIGH ROLLERS</div>
      <div class="btn full">WEEKLY STREAM</div>
      <div class="btn full">OTHER DROPS</div>
    </div>

    <div class="status disconnected" id="status">CONNECTING…</div>
  </div>
</div>

<div class="notification" id="notification"></div>

<script>
  // ── Silence console ─────────────────────────────
  (function() {
    const noop = () => {};
    ['log','warn','error','info','debug','trace','dir','dirxml','group','groupEnd','time','timeEnd','assert','profile']
      .forEach(m => console[m] = noop);
  })();

  // ── Credentials (edit here) ──────────────────────
  // Format: { "username": "password" }
  const USERS = {
    "bharat": "drop2024",
    "admin":  "admin123"
  };

  let currentUser = null;

  // ── Login logic ──────────────────────────────────
  function attemptLogin() {
    const user = document.getElementById("loginUser").value.trim().toLowerCase();
    const pass = document.getElementById("loginPass").value;
    const errEl = document.getElementById("loginError");
    const btn   = document.getElementById("loginBtn");

    if (!user || !pass) {
      showLoginError("PLEASE FILL IN ALL FIELDS");
      return;
    }

    btn.disabled = true;
    btn.textContent = "CHECKING…";

    setTimeout(() => {
      if (USERS[user] && USERS[user] === pass) {
        currentUser = user;
        localStorage.setItem("codedrop_user", user);
        errEl.textContent = "";
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("appScreen").classList.add("visible");
        document.getElementById("welcomeTag").textContent = user.toUpperCase();
        document.getElementById("codeInput").focus();
        initSocket();
      } else {
        showLoginError("INVALID USERNAME OR PASSWORD");
        ["loginUser","loginPass"].forEach(id => {
          const el = document.getElementById(id);
          el.classList.add("shake");
          setTimeout(() => el.classList.remove("shake"), 350);
        });
        document.getElementById("loginPass").value = "";
        btn.disabled = false;
        btn.textContent = "LOGIN";
      }
    }, 400);
  }

  function showLoginError(msg) {
    const el = document.getElementById("loginError");
    el.textContent = msg;
    const btn = document.getElementById("loginBtn");
    btn.disabled = false;
    btn.textContent = "LOGIN";
  }

  function logout() {
    currentUser = null;
    localStorage.removeItem("codedrop_user");
    if (socket) socket.disconnect();
    document.getElementById("appScreen").classList.remove("visible");
    document.getElementById("loginScreen").classList.remove("hidden");
    document.getElementById("loginUser").value = "";
    document.getElementById("loginPass").value = "";
    document.getElementById("loginError").textContent = "";
    updateStatus("CONNECTING…", "disconnected");
    updateConnectionIndicator("disconnected");
  }

  // Enter key on login inputs
  ["loginUser","loginPass"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => {
      if (e.key === "Enter") attemptLogin();
    });
  });

  // ── Socket (initialized after login) ────────────
  let socket = null;
  let selectedValue = "$1";
  let selectedType  = "HIGH ROLLERS";

  function initSocket() {
    if (socket) { socket.connect(); return; }

    socket = io("https://v2-jbgw.onrender.com/ws/ingest", {
      transports: ["websocket"],
      query: { username: "bharat" },
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
      reconnectionAttempts: Infinity,
      timeout: 20000,
      forceNew: false,
      perMessageDeflate: false
    });

    socket.on("connect", () => {
      updateStatus("CONNECTED", "connected");
      updateConnectionIndicator("connected");
      showNotification("Connected", "success");
    });

    socket.on("disconnect", reason => {
      updateStatus("DISCONNECTED", "disconnected");
      updateConnectionIndicator("disconnected");
      if (reason === "io server disconnect")
        showNotification("Server closed connection", "error");
      else if (reason === "transport error" || reason === "transport close")
        showNotification("Connection lost", "error");
    });

    socket.on("reconnect_attempt", n => {
      updateStatus(`RECONNECTING (${n})...`, "disconnected");
      updateConnectionIndicator("connecting");
    });

    socket.on("reconnect", () => showNotification("Reconnected!", "success"));
    socket.on("reconnect_failed", () => {
      updateStatus("RECONNECTION FAILED", "disconnected");
      showNotification("Cannot reconnect", "error");
    });

    setInterval(() => {
      if (socket && socket.connected) socket.emit("client_heartbeat");
    }, 30000);
  }

  // ── Status helpers ───────────────────────────────
  function updateStatus(text, cls) {
    const el = document.getElementById("status");
    el.innerText = text;
    el.className = `status ${cls}`;
  }

  function updateConnectionIndicator(state) {
    document.getElementById("connectionIndicator").className = `connection-indicator ${state}`;
  }

  function showNotification(msg, type) {
    const n = document.getElementById("notification");
    n.innerText = msg;
    n.className = `notification ${type} show`;
    setTimeout(() => n.classList.remove("show"), 3000);
  }

  // ── Button grids ─────────────────────────────────
  function setupGrid(gridId, onSelect) {
    document.querySelectorAll(`#${gridId} .btn`).forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(`#${gridId} .btn`).forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        onSelect(btn.innerText);
      };
    });
  }

  setupGrid("valueGrid", v => { selectedValue = v === "NO VALUE" ? null : v; });
  setupGrid("typeGrid",  t => { selectedType  = t; });

  // ── Send code ────────────────────────────────────
  document.getElementById("codeInput").addEventListener("keydown", e => {
    if (e.key === "Enter") sendCode();
  });

  function sendCode() {
    const input = document.getElementById("codeInput");
    const code  = input.value.trim();
    if (input.disabled) return;
    if (!code) { showNotification("Please enter a code", "error"); return; }
    if (!socket || !socket.connected) { showNotification("Not connected – please wait", "error"); return; }

    const payload = {
      token:    "marc_henry",
      username: "bharat",
      code:     code,
      source:   "web-ui",
      type:     "default",
      codetype: selectedType.toLowerCase().replace(/ /g, "_"),
      value:    selectedValue
    };

    input.disabled = true;
    socket.emit("code", payload);
    input.value    = "";
    input.disabled = false;
    input.focus();
    showNotification(`Code "${code}" sent`, "success");
  }

  // ── Network events ───────────────────────────────
  window.addEventListener("online", () => {
    showNotification("Internet restored", "success");
    if (socket && !socket.connected) socket.connect();
  });
  window.addEventListener("offline", () => {
    showNotification("No internet connection", "error");
    updateStatus("OFFLINE", "disconnected");
    updateConnectionIndicator("disconnected");
  });
</script>
</body>
</html>
